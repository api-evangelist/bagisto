apis:
- name: Bagisto REST API
  description: RESTful API for managing all Bagisto e-commerce operations including
    products, categories, customers, orders, inventory, cart, checkout, and administrative
    functions. Provides separate Shop and Admin API namespaces secured with Laravel
    Sanctum tokens.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
