aid: bagisto
name: Bagisto
description: Bagisto is a free and open-source Laravel e-commerce platform that provides
  REST and GraphQL APIs for managing products, categories, customers, orders, inventory,
  carts, and multi-channel selling. Built on Laravel Sanctum, the API offers both
  a public Storefront API and a full-control Admin API, making it suitable for headless
  commerce, mobile apps, and third-party integrations.
